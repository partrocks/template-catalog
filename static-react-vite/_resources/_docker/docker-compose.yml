services:
    app:
        image: node:20-alpine
        working_dir: /app
        command: sh -c "npm install && exec npm run dev -- --host 0.0.0.0 --port 5173"
        ports:
            - "{{localPort}}:5173"
        volumes:
            - .:/app
        environment:
            NODE_ENV: development
            CHOKIDAR_USEPOLLING: "true"
