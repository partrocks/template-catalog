schemaVersion: 3
environments:
  dev:
    id: dev
    runtime: docker
    docker:
      composeFile: _docker/docker-compose.yml
      service: app
      url:
        scheme: http
        domain: localhost
        port: "{{localPort}}"
    vars:
      localPort:
        required: true
        default: "8080"

  # Production: all AWS presets (pick one per deploy). Preset packages declare which shareable gateways apply.
  prod:
    id: prod
    runtime: cloud
    boot:
      script: _deploy/hooks/cloud-boot.sh
    deploy:
      presets:
        - aws/minimal-http
        - aws/cloudfront-s3
        - aws/alb-ec2

  uat:
    id: uat
    runtime: cloud
    boot:
      script: _deploy/hooks/cloud-boot.sh
    deploy:
      presets:
        - aws/minimal-http
        - aws/cloudfront-s3
        - aws/alb-ec2
