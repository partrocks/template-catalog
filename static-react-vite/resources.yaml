# Two shareable gateway selectors (sliceFlavor must match the shareable gateway you bind).
# `prod` / `uat` list all three AWS presets; each preset.yaml sets omitShareableResourceIds so only
# the gateways that preset needs are required when you pick that preset for deploy.
resources:
  - id: publicGatewayCdn
    kind: gateway
    shareable: true
    constraints:
      sliceFlavor: cloudfront
      protocol: https
      routing: host
    binding:
      scope: environment
  - id: publicGatewayAlb
    kind: gateway
    shareable: true
    constraints:
      sliceFlavor: alb
      protocol: https
      routing: host
    binding:
      scope: environment
