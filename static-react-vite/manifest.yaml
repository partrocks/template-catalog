manifest:
  id: static-react-vite
  name: React (Vite)
  description: Static or SPA build with React and Vite; AWS paths include public S3
    website HTTP, CloudFront+S3, or ALB→EC2 (see presets).
  version: 1.2.4
  baseImage: node:20-alpine
  tags:
  - static
  - react
  - vite
  - javascript
  - aws
  - s3
  categories:
  - static-web-app
  capabilities: 'Client-side React, Vite bundler, static export/CDN-friendly output;
    local Docker dev; AWS presets for S3 website (HTTP), CloudFront+S3, and ALB→EC2.

    '
  logos:
  - react
  - vite
