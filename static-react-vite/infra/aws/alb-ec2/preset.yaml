preset:
  provider: aws
  id: alb-ec2
  label: ALB → EC2
  description: >-
    Single EC2 instance is the ALB target: DNS alias and HTTPS terminate on the PartRocks shareable
    ALB — bind resource id `publicGatewayAlb` (sliceFlavor alb). Native apply uploads the built `dist/`
    as a gzipped tarball to a dedicated private S3 bucket (7-day object expiration), attaches an
    instance profile, and generates UserData that installs the AWS CLI, downloads the archive, unpacks
    to the web root, and serves it with Python's HTTP server on `appPort` for the target group.
  engine: provider-native
  omitShareableResourceIds:
    - publicGatewayCdn
  capabilities:
    - appRuntime
    - envConfig
  constraints:
    appPort: 80
    appHealthPath: /
    ec2InstanceType: t3.micro
  outputs:
    - key: public_url
      value: "{{ facts.iac.outputs.FRONT_DOOR_URL }}"
    - key: dns_name
      value: "{{ facts.iac.outputs.FRONT_DOOR_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ facts.iac.outputs.FRONT_DOOR_HOSTED_ZONE_ID }}"
  slices:
    - instanceKey: app
      sliceKind: app_runtime
      sliceFlavor: ec2_alb_backend
  preflights:
    artifacts:
      type: archive
      archive:
        path: dist
        buildCommand: CI=true npm ci && npm run build
  teardown:
    policy: cleanup
  ui:
    badges:
      - edge-tls
      - compute
    securityPosture: edge-tls-only
    costTier: medium
    complexity: high
    notes: >-
      FRONT_DOOR_* outputs come from the bound shareable ALB after apply + edge sync.
      UserData runs once per instance: a redeploy uploads a new S3 object, but an existing instance
      keeps serving the previous tree until you replace the instance (or use a future ASG/SSM path).
      Handoff objects expire after 7 days via bucket lifecycle.
    images:
      - infra/aws/alb-ec2/diagram.svg
