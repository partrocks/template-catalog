preset:
  provider: aws
  id: alb-ec2
  label: DNS → ALB → EC2 (shareable ALB gateway)
  description: >-
    Single EC2 instance is the ALB target: DNS alias and HTTPS terminate on the PartRocks shareable
    ALB — bind resource id `publicGatewayAlb` (sliceFlavor alb). Native apply registers the instance
    private IP with the gateway target group. Archive preflight still builds dist/ for consistency with
    other React presets, but deploy does not copy dist/ onto the host yet (release-to-instance handling
    is future work); optional `ec2UserDataBash` serves a tiny placeholder over HTTP so the target group
    can pass health checks.
  engine: provider-native
  omitShareableResourceIds:
    - publicGatewayCdn
  capabilities:
    - appRuntime
    - envConfig
  constraints:
    appPort: 80
    appHealthPath: /
    ec2InstanceType: t3.micro
    ec2CloudBootCommand: "sh /opt/partrocks/hooks/cloud-boot.sh"
    ec2UserDataBash: |
      #!/bin/bash
      set -euo pipefail
      mkdir -p /var/partrocks/www
      printf '%s\n' '<!doctype html><html><head><meta charset="utf-8"><title>PartRocks</title></head><body><p>EC2 ALB target placeholder. Built static assets are not synced here yet — use the S3 presets or extend release handling.</p></body></html>' > /var/partrocks/www/index.html
      cd /var/partrocks/www
      nohup python3 -m http.server 80 --bind 0.0.0.0 </dev/null >/var/log/partrocks-http.log 2>&1 &
  outputs:
    - key: public_url
      value: "{{ facts.iac.outputs.FRONT_DOOR_URL }}"
    - key: dns_name
      value: "{{ facts.iac.outputs.FRONT_DOOR_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ facts.iac.outputs.FRONT_DOOR_HOSTED_ZONE_ID }}"
  slices:
    - instanceKey: app
      sliceKind: app_runtime
      sliceFlavor: ec2_alb_backend
  preflights:
    artifacts:
      type: archive
      archive:
        path: dist
        buildCommand: CI=true npm ci && npm run build
  teardown:
    policy: cleanup
  ui:
    badges:
      - edge-tls
      - compute
    securityPosture: edge-tls-only
    costTier: medium
    complexity: high
    notes: >-
      FRONT_DOOR_* outputs come from the bound shareable ALB after apply + edge sync. Root EBS only;
      extra data volumes and pushing release archives to the instance are not modeled in this template yet.
    images:
      - infra/aws/alb-ec2/diagram.svg
