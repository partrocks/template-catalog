preset:
  provider: aws
  id: secure-edge
  label: Secure Edge (Shared Gateway Ready)
  description: S3 static origin for shared gateway TLS routing; runs a fresh npm production build from the release tag, then syncs dist/.
  engine: opentofu
  source: opentofu.tf
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ FRONT_DOOR_URL }}"
    - key: dns_name
      value: "{{ FRONT_DOOR_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ FRONT_DOOR_HOSTED_ZONE_ID }}"
  preflights:
    artifacts:
      type: archive
      archive:
        path: dist
        buildCommand: CI=true npm ci && npm run build
  teardown:
    policy: cleanup
  ui:
    badges:
      - edge-tls
      - production-ready
    securityPosture: edge-tls-only
    costTier: medium
    complexity: medium
    notes: Pair with a shared gateway for HTTPS on your domain. Each deploy runs a clean npm ci && npm run build from the release tag so deploys never use a stale local dist/.
    images:
      - infra/aws/secure-edge/diagram.svg
