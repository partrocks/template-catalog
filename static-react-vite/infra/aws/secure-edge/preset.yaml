preset:
  provider: aws
  id: secure-edge
  label: Secure Edge (Shared Gateway Ready)
  description: S3 static origin for shared gateway TLS routing; syncs Vite dist/ from the release tag or PartRocks archive preflight.
  engine: opentofu
  source: opentofu.tf
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ FRONT_DOOR_URL }}"
    - key: dns_name
      value: "{{ FRONT_DOOR_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ FRONT_DOOR_HOSTED_ZONE_ID }}"
  preflights:
    artifacts:
      type: archive
      archive:
        path: dist
  teardown:
    policy: cleanup
  ui:
    badges:
      - edge-tls
      - production-ready
    securityPosture: edge-tls-only
    costTier: medium
    complexity: medium
    notes: Pair with a shared gateway for HTTPS on your domain. Run npm run build and commit dist/ before tagging, or rely on the dist/ path from archive preflight.
    images:
      - infra/aws/secure-edge/diagram.svg
