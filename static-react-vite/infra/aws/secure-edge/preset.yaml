preset:
  provider: aws
  id: secure-edge
  label: Secure Edge (ALB + S3)
  description: >-
    Production static hosting: shareable S3 website origin plus ALB edge registration for TLS at the
    shareable gateway. Use with a PartRocks shareable ALB `front_door` resource; npm build then sync dist/.
  engine: provider-native
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ facts.iac.outputs.FRONT_DOOR_URL }}"
    - key: dns_name
      value: "{{ facts.iac.outputs.FRONT_DOOR_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ facts.iac.outputs.FRONT_DOOR_HOSTED_ZONE_ID }}"
  slices:
    - instanceKey: origin
      sliceKind: static_site
      sliceFlavor: s3
      shareable: true
    - instanceKey: edge
      sliceKind: edge_workload
      sliceFlavor: alb_ip_registration
      refs:
        - relation: origin_bucket
          targetInstanceKey: origin
  preflights:
    artifacts:
      type: archive
      archive:
        path: dist
        buildCommand: CI=true npm ci && npm run build
  teardown:
    policy: cleanup
  ui:
    badges:
      - edge-tls
      - production-ready
    securityPosture: edge-tls-only
    costTier: medium
    complexity: medium
    notes: >-
      Native apply provisions the S3 website bucket; ALB listener rules and TLS live on the shareable gateway.
      Each deploy runs npm ci && npm run build from the release tag.
    images:
      - infra/aws/secure-edge/diagram.svg
