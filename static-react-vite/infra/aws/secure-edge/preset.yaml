preset:
  provider: aws
  id: secure-edge
  label: Secure Edge (CloudFront + S3)
  description: Production static hosting with CloudFront in front of S3; npm build then sync dist/. Use with a PartRocks shareable CloudFront gateway.
  engine: opentofu
  source: opentofu.tf
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ FRONT_DOOR_URL }}"
    - key: dns_name
      value: "{{ FRONT_DOOR_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ FRONT_DOOR_HOSTED_ZONE_ID }}"
    - key: CLOUDFRONT_DISTRIBUTION_ID
      value: "{{ CLOUDFRONT_DISTRIBUTION_ID }}"
  preflights:
    artifacts:
      type: archive
      archive:
        path: dist
        buildCommand: CI=true npm ci && npm run build
  teardown:
    policy: cleanup
  ui:
    badges:
      - edge-tls
      - production-ready
    securityPosture: edge-tls-only
    costTier: medium
    complexity: medium
    notes: Default production preset. OpenTofu creates S3 + CloudFront; dns_name is the distribution hostname. Pair with shareable gateway gatewayFlavor cloudfront. Each deploy runs npm ci && npm run build from the release tag.
    images:
      - infra/aws/secure-edge/diagram.svg
