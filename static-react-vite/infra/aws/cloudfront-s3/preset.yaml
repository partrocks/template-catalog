preset:
  provider: aws
  id: cloudfront-s3
  label: DNS → CloudFront → S3 (shareable CloudFront gateway)
  description: >-
    DNS alias and HTTPS on a PartRocks shareable CloudFront distribution; S3 is the private origin for
    your built static site — bind resource id `publicGatewayCdn` (sliceFlavor cloudfront). npm ci &&
    npm run build; deploy syncs dist/. This path does not use an ALB or EC2.
  engine: provider-native
  omitShareableResourceIds:
    - publicGatewayAlb
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ facts.iac.outputs.FRONT_DOOR_URL }}"
    - key: dns_name
      value: "{{ facts.iac.outputs.FRONT_DOOR_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ facts.iac.outputs.FRONT_DOOR_HOSTED_ZONE_ID }}"
  slices:
    - instanceKey: origin
      sliceKind: static_site
      sliceFlavor: s3
      shareable: true
  preflights:
    artifacts:
      type: archive
      archive:
        path: dist
        buildCommand: CI=true npm ci && npm run build
  teardown:
    policy: cleanup
  ui:
    badges:
      - edge-tls
      - production-ready
    securityPosture: edge-tls-only
    costTier: medium
    complexity: medium
    notes: >-
      FRONT_DOOR_* outputs are filled from the bound shareable gateway (CloudFront) after apply.
      Origin is a tagged S3 bucket; sync publishes static files from the release archive.
    images:
      - infra/aws/cloudfront-s3/diagram.svg
