preset:
  provider: aws
  id: minimal-http
  label: Minimal HTTP (S3 website)
  description: Lowest-cost static hosting with S3 website endpoint (HTTP only); syncs Vite dist/ from the release tag or PartRocks archive preflight.
  engine: opentofu
  source: opentofu.tf
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ SITE_URL }}"
    - key: dns_name
      value: "{{ SITE_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ SITE_HOSTED_ZONE_ID }}"
  preflights:
    artifacts:
      type: archive
      archive:
        path: dist
  teardown:
    policy: cleanup
  ui:
    badges:
      - low-cost
      - no-edge-tls
    securityPosture: dev-only
    costTier: low
    complexity: low
    notes: Before tagging a release, run npm run build and commit dist/ so the deploy sync has assets (or rely on archive preflight from the same tree).
    images:
      - infra/aws/minimal-http/diagram.svg
