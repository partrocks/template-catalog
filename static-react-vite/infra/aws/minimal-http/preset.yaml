preset:
  provider: aws
  id: minimal-http
  label: Minimal HTTP (S3 website, dev)
  description: S3 website only after npm build + sync dist/. Dev/experimental; production should use Secure Edge (CloudFront + S3) with a shareable CloudFront gateway.
  engine: provider-native
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ facts.iac.outputs.SITE_URL }}"
    - key: dns_name
      value: "{{ facts.iac.outputs.SITE_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ facts.iac.outputs.SITE_HOSTED_ZONE_ID }}"
  slices:
    - instanceKey: site
      sliceKind: static_site
      sliceFlavor: s3
      shareable: true
  preflights:
    artifacts:
      type: archive
      archive:
        path: dist
        buildCommand: CI=true npm ci && npm run build
  teardown:
    policy: cleanup
  ui:
    badges:
      - low-cost
      - dev-experimental
    securityPosture: edge-tls-only
    costTier: low
    complexity: low
    notes: >-
      Dev/experimental only. Outputs target the S3 website endpoint, not CloudFront—mismatched with a gateway resource in resources.yaml. Use Secure Edge for production.
    images:
      - infra/aws/minimal-http/diagram.svg
