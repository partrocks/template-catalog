preset:
  provider: aws
  id: minimal-http
  label: S3 website HTTP only (no shared gateway)
  description: >-
    One S3 bucket with static website hosting: npm ci && npm run build, then deploy syncs dist/.
    The front door is the bucket’s public website endpoint over HTTP — no CloudFront or ALB resource.
  engine: provider-native
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ facts.iac.outputs.SITE_URL }}"
    - key: dns_name
      value: "{{ facts.iac.outputs.SITE_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ facts.iac.outputs.SITE_HOSTED_ZONE_ID }}"
  slices:
    - instanceKey: site
      sliceKind: static_site
      sliceFlavor: s3_public_website
      shareable: true
  preflights:
    artifacts:
      type: archive
      archive:
        path: dist
        buildCommand: CI=true npm ci && npm run build
  teardown:
    policy: cleanup
  ui:
    badges:
      - low-cost
      - dev-experimental
    securityPosture: http-only-on-origin
    costTier: low
    complexity: low
    notes: Outputs target the S3 website endpoint over HTTP.
    images:
      - infra/aws/minimal-http/diagram.svg
