preset:
  provider: aws
  id: minimal-http
  label: Minimal HTTP (S3 website)
  description: Lowest-cost static hosting with a dedicated S3 bucket; syncs Vite dist/ from the release tag or PartRocks archive preflight. Use a shared gateway for HTTPS.
  engine: opentofu
  source: opentofu.tf
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ SITE_URL }}"
    - key: dns_name
      value: "{{ SITE_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ SITE_HOSTED_ZONE_ID }}"
  preflights:
    artifacts:
      type: archive
      archive:
        path: dist
  teardown:
    policy: cleanup
  ui:
    badges:
      - low-cost
      - edge-tls
    securityPosture: edge-tls-only
    costTier: low
    complexity: low
    notes: >-
      Provisions a new S3 bucket and syncs dist/. The website endpoint is HTTP at the origin; TLS on your domain comes from the PartRocks shared gateway.
      Before tagging, run npm run build and commit dist/ (or rely on archive preflight). Secure edge preset matches this infra with FRONT_DOOR_* outputs for gateway workflows.
    images:
      - infra/aws/minimal-http/diagram.svg
