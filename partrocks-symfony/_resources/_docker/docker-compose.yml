services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.local
        container_name: docker-app-app
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html:delegated
        environment:
            APP_ENV: dev
            DATABASE_URL: postgresql://app:app@db:5432/app?serverVersion=18&charset=utf8
            JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
            JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
            JWT_PASSPHRASE:
            COMPOSER_ALLOW_SUPERUSER: 1
        entrypoint: ["/usr/local/bin/entrypoint.sh"]
        command: sh -c "php -S 0.0.0.0:8000 -t public"
        ports:
            - "8000:8000"
        depends_on:
            db:
                condition: service_healthy

    # PostgreSQL Database
    db:
        container_name: db
        image: postgres:18.1-alpine
        environment:
            POSTGRES_DB: app
            POSTGRES_USER: app
            POSTGRES_PASSWORD: app
        volumes:
            - database_data:/var/lib/postgresql
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U app -d app"]
            interval: 2s
            timeout: 5s
            retries: 10
            start_period: 5s

volumes:
    database_data:
