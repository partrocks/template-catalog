environments:
  local:
    id: local
    runtime: docker
    docker:
      composeFile: _docker/docker-compose.yml
      url:
        scheme: http
        domain: localhost
        port: 8000
        # path: /app
        # query: debug=true
      commands:
        - clear-cache:
          run:
            - label: Clear cache
            - command: "php bin/console cache:clear --no-interaction"
        - migrate-database:
          run:
            - label: Migrate database
            - command: "php bin/console doctrine:migrations:migrate --no-interaction"
        - load-fixtures:
          run:
            - label: Load fixtures
            - command: "php bin/console doctrine:fixtures:load --no-interaction"
    vars:
      DATABASE_URL:
        required: true
        secret: true
      APP_MODE:
        required: true
        default: dev

  base-cloud:
    id: base-cloud
    abstract: true
    runtime: cloud
    vars:
      DATABASE_URL:
        required: true
        secret: true
      APP_MODE:
        required: true
        default: prod

  prod:
    id: prod
    extends: base-cloud
    deploy:
      targets:
        aws:
          engine: opentofu
          source: _deploy/opentofu-aws.tf
        digitalocean:
          engine: opentofu
          source: _deploy/opentofu-do.tf
