schemaVersion: 2
environments:
  local:
    id: local
    runtime: docker
    docker:
      composeFile: _docker/docker-compose.yml
      url:
        scheme: http
        domain: localhost
        port: "{{localPort}}"
      commands:
        - clear-cache:
          run:
            - label: Clear cache
            - command: "php bin/console cache:clear --no-interaction"
        - migrate-database:
          run:
            - label: Migrate database
            - command: "php bin/console doctrine:migrations:migrate --no-interaction"
        - load-fixtures:
          run:
            - label: Load fixtures
            - command: "php bin/console doctrine:fixtures:load --no-interaction"
    vars:
      DATABASE_URL:
        required: true
        secret: true
      APP_MODE:
        required: true
        default: dev

  uat:
    id: uat
    runtime: cloud
    vars:
      DATABASE_URL:
        required: true
        secret: true
      APP_MODE:
        required: true
        default: prod
    lifecycle:
      hooks:
        release:
          runPolicy: once_per_release_per_env
          onFailure: abort_deploy
          timeoutSeconds: 900
          steps:
            - id: db-create-if-missing
              run: "php bin/console doctrine:database:create --if-not-exists --no-interaction || true"
            - id: db-migrate
              run: "php bin/console doctrine:migrations:migrate --no-interaction || true"
        startup:
          runPolicy: per_instance_start
          onFailure: restart_instance
          timeoutSeconds: 180
          steps:
            - id: runtime-bootstrap
              run: "sh _deploy/hooks/runtime-bootstrap.sh"
            - id: cache-warmup
              run: "php bin/console cache:warmup --no-interaction || true"
    deploy:
      presets:
        - aws/cheap-and-cheerful
        - aws/maximum-effort-at-a-price
        - digitalocean/app-platform-default

  prod:
    id: prod
    runtime: cloud
    vars:
      DATABASE_URL:
        required: true
        secret: true
      APP_MODE:
        required: true
        default: prod
    lifecycle:
      hooks:
        release:
          runPolicy: once_per_release_per_env
          onFailure: abort_deploy
          timeoutSeconds: 900
          steps:
            - id: db-create-if-missing
              run: "php bin/console doctrine:database:create --if-not-exists --no-interaction || true"
            - id: db-migrate
              run: "php bin/console doctrine:migrations:migrate --no-interaction || true"
        startup:
          runPolicy: per_instance_start
          onFailure: restart_instance
          timeoutSeconds: 180
          steps:
            - id: runtime-bootstrap
              run: "sh _deploy/hooks/runtime-bootstrap.sh"
            - id: cache-warmup
              run: "php bin/console cache:warmup --no-interaction || true"
    deploy:
      presets:
        - aws/cheap-and-cheerful
        - aws/maximum-effort-at-a-price
