preset:
  provider: digitalocean
  id: app-platform-default
  label: App Platform Default
  description: Managed app platform deployment on DigitalOcean.
  engine: opentofu
  source: opentofu.tf
  capabilities:
    - appRuntime
  constraints:
    appPort: 9000
    appHealthPath: /
    # Default region slug; profile `digitaloceanDefaultRegion` overrides at deploy
    # (mergeProviderConstraintsFromPreferences in user-profile).
    doRegion: nyc1
    doInstanceSize: basic-xxs
    doInstanceCount: 1
    databaseUrl: ""
    appSecret: ""
    jwtSecretKey: ""
  outputs:
    - key: public_url
      value: "{{ APP_BASE_URL }}"
    - key: dns_name
      value: "{{ APP_DNS_NAME }}"
  slices:
    - instanceKey: app
      sliceKind: app_runtime
      sliceFlavor: digitalocean_app_platform
  preflights:
    artifacts:
      type: container_image
      containerImage:
        dockerfile: _docker/Dockerfile.cloud
        context: .
        repositoryName: partrocks/{{projectName}}
        tagStrategy: releaseTag
  ui:
    badges:
      - managed-platform
    securityPosture: edge-tls-only
    costTier: medium
    complexity: low
    images:
      - infra/digitalocean/app-platform-default/diagram.svg
