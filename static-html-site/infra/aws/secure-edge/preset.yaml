preset:
  provider: aws
  id: secure-edge
  label: Secure Edge (CloudFront + S3)
  description: Production static hosting with CloudFront in front of S3; use with a PartRocks shareable CloudFront gateway for custom domains and TLS.
  engine: provider-native
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ FRONT_DOOR_URL }}"
    - key: dns_name
      value: "{{ FRONT_DOOR_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ FRONT_DOOR_HOSTED_ZONE_ID }}"
    - key: CLOUDFRONT_DISTRIBUTION_ID
      value: "{{ CLOUDFRONT_DISTRIBUTION_ID }}"
  slices:
    - instanceKey: origin
      sliceKind: static_site
      sliceFlavor: s3
      shareable: true
    - instanceKey: edge
      sliceKind: edge_workload
      sliceFlavor: cloudfront_s3_origin
      refs:
        - relation: origin_bucket
          targetInstanceKey: origin
  preflights:
    artifacts:
      type: archive
      archive:
        path: .
  teardown:
    policy: cleanup
  ui:
    badges:
      - edge-tls
      - production-ready
    securityPosture: edge-tls-only
    costTier: medium
    complexity: medium
    notes: Default production preset. Native provisioning creates S3 + CloudFront; dns_name targets the distribution. Pair a gateway resource with gatewayFlavor cloudfront (shareable when reusing PartRocks project-scoped edge).
    images:
      - infra/aws/secure-edge/diagram.svg
