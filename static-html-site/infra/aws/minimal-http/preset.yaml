preset:
  provider: aws
  id: minimal-http
  label: Minimal HTTP (S3 website)
  description: Lowest-cost static hosting with a dedicated S3 bucket and website endpoint; pair with a PartRocks shared gateway for HTTPS on your domain.
  engine: opentofu
  source: opentofu.tf
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ SITE_URL }}"
    - key: dns_name
      value: "{{ SITE_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ SITE_HOSTED_ZONE_ID }}"
  preflights:
    artifacts:
      type: archive
      archive:
        path: .
  teardown:
    policy: cleanup
  ui:
    badges:
      - low-cost
      - edge-tls
    securityPosture: edge-tls-only
    costTier: low
    complexity: low
    notes: >-
      Provisions a new S3 bucket and syncs your release assets. The website endpoint is HTTP at the origin;
      TLS and public DNS are provided by your PartRocks shared gateway (Route 53 alias targets use dns_name + canonical_hosted_zone_id).
      The Secure edge preset is the same infrastructure with output names oriented for gateway binding—either is valid for production behind the gateway.
    images:
      - infra/aws/minimal-http/diagram.svg
