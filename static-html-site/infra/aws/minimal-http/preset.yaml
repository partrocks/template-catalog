preset:
  provider: aws
  id: minimal-http
  label: Minimal HTTP (public S3 website)
  description: >-
    S3 static website only — public HTTP bucket endpoint. No shareable ALB required.
  engine: provider-native
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ facts.iac.outputs.SITE_URL }}"
    - key: dns_name
      value: "{{ facts.iac.outputs.SITE_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ facts.iac.outputs.SITE_HOSTED_ZONE_ID }}"
  slices:
    - instanceKey: site
      sliceKind: static_site
      sliceFlavor: s3_public_website
      shareable: true
  preflights:
    artifacts:
      type: archive
      archive:
        path: .
        buildCommand: "true"
  teardown:
    policy: cleanup
  ui:
    badges:
      - low-cost
      - dev-experimental
    securityPosture: http-only-on-origin
    costTier: low
    complexity: low
    images:
      - infra/aws/minimal-http/diagram.svg
