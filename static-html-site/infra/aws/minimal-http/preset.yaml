preset:
  provider: aws
  id: minimal-http
  label: Minimal HTTP (S3 website, dev)
  description: S3 website endpoint only (HTTP origin). For trying lowest cost locally; production should use Secure Edge (CloudFront + S3) and a shareable CloudFront gateway.
  engine: opentofu
  source: opentofu.tf
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ SITE_URL }}"
    - key: dns_name
      value: "{{ SITE_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ SITE_HOSTED_ZONE_ID }}"
  preflights:
    artifacts:
      type: archive
      archive:
        path: .
  teardown:
    policy: cleanup
  ui:
    badges:
      - low-cost
      - dev-experimental
    securityPosture: edge-tls-only
    costTier: low
    complexity: low
    notes: >-
      Dev/experimental only. Outputs point at the S3 website endpoint, not CloudFront.
      PartRocks static templates require a shareable CloudFront gateway (see resources.yaml); use Secure Edge for production so dns_name matches the distribution.
    images:
      - infra/aws/minimal-http/diagram.svg
