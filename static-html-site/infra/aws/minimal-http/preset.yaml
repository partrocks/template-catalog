preset:
  provider: aws
  id: minimal-http
  label: Minimal HTTP (S3 website)
  description: Cheapest possible static hosting with S3 website endpoint (HTTP only).
  engine: opentofu
  source: opentofu.tf
  capabilities:
    - envConfig
  constraints: {}
  outputs:
    - key: public_url
      value: "{{ SITE_URL }}"
    - key: dns_name
      value: "{{ SITE_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ SITE_HOSTED_ZONE_ID }}"
  preflights:
    artifacts:
      type: archive
      archive:
        path: .
  teardown:
    policy: cleanup
  ui:
    badges:
      - low-cost
      - no-edge-tls
    securityPosture: dev-only
    costTier: low
    complexity: low
    notes: DNS alias works for apex domains, but HTTPS requires a TLS-capable edge.
    images:
      - infra/aws/minimal-http/diagram.svg
