preset:
  provider: aws
  id: ec2-alb-postgres
  label: EC2 + ALB + RDS
  description: Symfony / FrankenPHP on EC2 behind a PartRocks shareable ALB, with PostgreSQL on RDS.
  engine: provider-native
  capabilities:
    - appRuntime
    - postgres
    - envConfig
  constraints:
    appPort: 8080
    appHealthPath: /health
    ec2InstanceType: t3.micro
    ec2HandoffLaunchMode: release_container
    databaseUrl: ""
    appSecret: ""
    jwtSecretKey: ""
  outputs:
    - key: APP_BASE_URL
      value: "{{ facts.iac.outputs.APP_BASE_URL }}"
    - key: public_url
      value: "{{ facts.iac.outputs.FRONT_DOOR_URL }}"
    - key: dns_name
      value: "{{ facts.iac.outputs.FRONT_DOOR_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ facts.iac.outputs.FRONT_DOOR_HOSTED_ZONE_ID }}"
    - key: DATABASE_URL
      value: "{{ facts.iac.outputs.DATABASE_URL }}"
    - key: APP_SECRET
      value: "{{ facts.iac.outputs.APP_SECRET }}"
    - key: JWT_SECRET_KEY
      value: "{{ facts.iac.outputs.JWT_SECRET_KEY }}"
    - key: APP_ENV
      value: "{{ facts.iac.outputs.APP_ENV }}"
  slices:
    - instanceKey: app
      sliceKind: app_runtime
      sliceFlavor: ec2_alb_backend
    - instanceKey: database
      sliceKind: database
      sliceFlavor: aws_rds_postgres
  preflights:
    artifacts:
      type: container_image
      containerImage:
        dockerfile: _docker/Dockerfile.cloud
        context: .
        repositoryName: partrocks/{{projectName}}
        registryRequirementId: appRegistry
        tagStrategy: releaseTag
  teardown:
    policy: cleanup
  ui:
    badges:
      - balanced
      - edge-tls
    securityPosture: edge-tls-only
    costTier: medium
    complexity: medium
    notes: >-
      Publishes the release image to ECR, then boots Amazon Linux 2023 on EC2 with Docker:
      `aws ecr get-login-password`, env file from deploy secrets, and `docker run` on `appPort`.
      For static file handoff (S3 tarball + Python http.server), set `ec2HandoffLaunchMode: static_http`
      and use `preflights.artifacts.type: archive` (or `default` with this EC2 flavor).
    images:
      - infra/aws/ec2-alb-postgres/diagram.svg
