preset:
  provider: aws
  id: ec2-alb-postgres
  label: EC2 + ALB + RDS
  description: Symfony / FrankenPHP on EC2 behind a PartRocks shareable ALB, with PostgreSQL on RDS.
  engine: provider-native
  capabilities:
    - appRuntime
    - postgres
    - envConfig
  constraints:
    appPort: 8080
    appHealthPath: /health
    ec2InstanceType: t3.micro
    ec2CloudBootCommand: "sh /opt/partrocks/hooks/cloud-boot.sh"
    databaseUrl: ""
    appSecret: ""
    jwtSecretKey: ""
  outputs:
    - key: APP_BASE_URL
      value: "{{ facts.iac.outputs.APP_BASE_URL }}"
    - key: public_url
      value: "{{ facts.iac.outputs.FRONT_DOOR_URL }}"
    - key: dns_name
      value: "{{ facts.iac.outputs.FRONT_DOOR_DNS_NAME }}"
    - key: canonical_hosted_zone_id
      value: "{{ facts.iac.outputs.FRONT_DOOR_HOSTED_ZONE_ID }}"
    - key: DATABASE_URL
      value: "{{ facts.iac.outputs.DATABASE_URL }}"
    - key: APP_SECRET
      value: "{{ facts.iac.outputs.APP_SECRET }}"
    - key: JWT_SECRET_KEY
      value: "{{ facts.iac.outputs.JWT_SECRET_KEY }}"
    - key: APP_ENV
      value: "{{ facts.iac.outputs.APP_ENV }}"
  slices:
    - instanceKey: app
      sliceKind: app_runtime
      sliceFlavor: ec2_alb_backend
    - instanceKey: database
      sliceKind: database
      sliceFlavor: aws_rds_postgres
  preflights:
    artifacts:
      # EC2 catalog apply does not pull from ECR; it optionally stages a release tarball to S3.
      # Explicit `none` skips the container build/push preflight (DigitalOcean preset still uses a container image).
      type: none
  teardown:
    policy: cleanup
  ui:
    badges:
      - balanced
      - edge-tls
    securityPosture: edge-tls-only
    costTier: medium
    complexity: medium
    notes: >-
      No ECR or shared registry preflight for this AWS path. The runtime is EC2 + ALB;
      choose the DigitalOcean preset when you need a container image build and push.
    images:
      - infra/aws/ec2-alb-postgres/diagram.svg
