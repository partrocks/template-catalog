preset:
  provider: digitalocean
  id: app-platform-default
  label: App Platform Default
  description: Managed App Platform deployment on DigitalOcean (Symfony / FrankenPHP).
  engine: provider-native
  capabilities:
    - appRuntime
  constraints:
    appPort: 8080
    appHealthPath: /health
    # doRegion: slugs like nyc1, lon1 (see DigitalOcean regions). Required so
    # {{ constraints.doRegion }} is applied to the App Platform spec at deploy; the
    # app merges profile preferences over this map (see user-profile
    # CONSTRAINT_PREFERENCE_OVERRIDES: doRegion <- digitaloceanDefaultRegion).
    doRegion: nyc1
    doInstanceSize: basic-xxs
    doInstanceCount: 1
    databaseUrl: ""
    appSecret: ""
    jwtSecretKey: ""
  outputs:
    - key: public_url
      value: "{{ facts.iac.outputs.APP_BASE_URL }}"
    - key: dns_name
      value: "{{ facts.iac.outputs.APP_DNS_NAME }}"
    - key: APP_PLATFORM_ID
      value: "{{ facts.iac.outputs.APP_PLATFORM_ID }}"
  slices:
    - instanceKey: app
      sliceKind: app_runtime
      sliceFlavor: digitalocean_app_platform
  preflights:
    artifacts:
      type: container_image
      containerImage:
        dockerfile: _docker/Dockerfile.cloud
        context: .
        # DOCR Starter allows 1 repository. Use one shared path + unique tags (appId-envId-tag).
        # Prefer a single path segment (no slash): DOCR has rejected pushes to repo/name on
        # Starter when that path was the second logical repository. If you still have an empty
        # partrocks/workspace repo from an older preset, delete it in DO, or set
        # imageRepositoryPath on the registry resource to that exact name.
        repositoryName: partrocks-workspace
        singleRepositoryImageLayout: true
        registryRequirementId: appRegistry
        tagStrategy: releaseTag
  teardown:
    policy: cleanup
  ui:
    badges:
      - managed-platform
    securityPosture: edge-tls-only
    costTier: medium
    complexity: low
    images:
      - infra/digitalocean/app-platform-default/diagram.svg
