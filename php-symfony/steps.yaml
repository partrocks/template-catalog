steps:
  - step: create-symfony-skeleton
    label: Creating Symfony 8 skeleton
    run:
      - command: >-
          composer create-project symfony/skeleton:"^8.0" . --no-interaction --no-ansi

  - step: require-webapp
    label: Installing webapp pack (Twig, Doctrine, security)
    run:
      - command: >-
          COMPOSER_MEMORY_LIMIT=-1 composer require webapp --no-interaction --no-ansi

  - step: prune-demo-controllers
    label: Removing demo controllers if present
    run:
      - command: >-
          rm -f src/Controller/DemoController.php src/Controller/HelloController.php 2>/dev/null; true

  - step: copy-scaffold-files
    label: Adding PartRocks landing page, FrankenPHP Caddyfile, .env (Docker dev defaults), and .dockerignore
    copy:
      from: scaffold
      to: .

  - step: patch-env-local-port
    label: Setting DEFAULT_URI to match chosen local HTTP port
    modify:
      file: .env
      replacements:
        - search: DEFAULT_URI=http://localhost:8080
          replace: DEFAULT_URI=http://localhost:{{localPort}}
