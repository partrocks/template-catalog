services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    working_dir: /app
    command: ["frankenphp", "run", "--config", "/app/docker/frankenphp/Caddyfile"]
    ports:
      - "{{localPort}}:8080"
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      DATABASE_URL: postgresql://symfony:symfony@db:5432/app?serverVersion=17&charset=utf8
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    ports:
      - "{{localDbPort}}:5432"
    environment:
      POSTGRES_USER: symfony
      POSTGRES_PASSWORD: symfony
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U symfony -d app"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
