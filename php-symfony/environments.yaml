schemaVersion: 2
environments:
  dev:
    id: dev
    runtime: docker
    docker:
      composeFile: _docker/docker-compose.yml
      service: app
      url:
        scheme: http
        domain: localhost
        port: "{{localPort}}"
      commands:
        make-migrations:
          label: Make migration(s)
          command: php bin/console make:migration --no-interaction
        migrate:
          label: Run migrations
          command: php bin/console doctrine:migrations:migrate --no-interaction
        clear-cache:
          label: Clear cache
          command: php bin/console cache:clear --no-interaction
    vars:
      localPort:
        required: true
        default: "8080"
      localDbPort:
        required: true
        default: "5432"

  staging:
    id: staging
    runtime: cloud
    lifecycle:
      hooks:
        release:
          runPolicy: once_per_release_per_env
          onFailure: abort_deploy
          timeoutSeconds: 900
          steps:
            - id: db-create-if-missing
              run: "php bin/console doctrine:database:create --if-not-exists --no-interaction || true"
            - id: db-migrate
              run: "php bin/console doctrine:migrations:migrate --no-interaction || true"
            - id: cache-clear
              run: "php bin/console cache:clear --no-interaction || true"
            - id: cache-warmup
              run: "php bin/console cache:warmup --no-interaction || true"
    deploy:
      presets:
        - aws/cheap-and-cheerful
        - aws/maximum-effort-at-a-price
        - digitalocean/app-platform-default

  prod:
    id: prod
    runtime: cloud
    lifecycle:
      hooks:
        release:
          runPolicy: once_per_release_per_env
          onFailure: abort_deploy
          timeoutSeconds: 900
          steps:
            - id: db-create-if-missing
              run: "php bin/console doctrine:database:create --if-not-exists --no-interaction || true"
            - id: db-migrate
              run: "php bin/console doctrine:migrations:migrate --no-interaction || true"
            - id: cache-clear
              run: "php bin/console cache:clear --no-interaction || true"
            - id: cache-warmup
              run: "php bin/console cache:warmup --no-interaction || true"
    deploy:
      presets:
        - aws/cheap-and-cheerful
        - aws/maximum-effort-at-a-price
        - digitalocean/app-platform-default
