schemaVersion: 2
environments:
  dev:
    id: dev
    runtime: docker
    docker:
      composeFile: _docker/docker-compose.yml
      service: app
      url:
        scheme: http
        domain: localhost
        port: "{{localPort}}"
    vars:
      localPort:
        required: true
        default: "8080"

  prod:
    id: prod
    runtime: cloud
    deploy:
      presets:
        - aws/cheap-and-cheerful
        - aws/maximum-effort-at-a-price
        - digitalocean/app-platform-default
