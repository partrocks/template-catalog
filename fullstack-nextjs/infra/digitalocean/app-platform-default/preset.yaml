preset:
  provider: digitalocean
  id: app-platform-default
  label: App Platform Default
  description: Managed app platform deployment on DigitalOcean.
  engine: opentofu
  source: opentofu.tf
  capabilities:
    - appRuntime
  constraints:
    appPort: 3000
    appHealthPath: /
    # doRegion: slugs like nyc1, lon1 (see DigitalOcean regions). Required so
    # {{ constraints.doRegion }} interpolates in opentofu.tf. At deploy time the
    # app merges profile preferences over this map (see user-profile
    # CONSTRAINT_PREFERENCE_OVERRIDES: doRegion <- digitaloceanDefaultRegion).
    doRegion: nyc1
    doInstanceSize: basic-xxs
    doInstanceCount: 1
    databaseUrl: ""
    appSecret: ""
    jwtSecretKey: ""
  outputs:
    - key: public_url
      value: "{{ APP_BASE_URL }}"
    - key: dns_name
      value: "{{ APP_DNS_NAME }}"
    - key: APP_PLATFORM_ID
      value: "{{ APP_PLATFORM_ID }}"
  preflights:
    artifacts:
      type: container_image
      containerImage:
        dockerfile: _docker/Dockerfile.cloud
        context: .
        # Fallback image path when no registry binding is used (legacy). When registryRequirementId
        # is set, repositoryName on the RegistryBinding.config is preferred after interpolation.
        repositoryName: partrocks/{{projectName}}
        registryRequirementId: appRegistry
        tagStrategy: releaseTag
  ui:
    badges:
      - managed-platform
    securityPosture: edge-tls-only
    costTier: medium
    complexity: low
    images:
      - infra/digitalocean/app-platform-default/diagram.svg
