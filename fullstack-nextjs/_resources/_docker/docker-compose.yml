services:
    app:
        image: node:20-alpine
        working_dir: /app
        command: sh -c "npm install && exec npm run dev -- --hostname 0.0.0.0 --port 3000"
        ports:
            - "{{localPort}}:3000"
        volumes:
            - .:/app
        environment:
            NODE_ENV: development
            WATCHPACK_POLLING: "true"
            CHOKIDAR_USEPOLLING: "true"
